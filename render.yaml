services:
  - type: web
    name: setu-dubber-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 5001
      - key: NODE_ENV
        value: production
      - key: PROJECT_ROOT
        value: /app
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: APIHUT_API_KEY
        sync: false
      - key: AZURE_STORAGE_CONNECTION_STRING
        sync: false
      - key: AZURE_STORAGE_CONTAINER
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
