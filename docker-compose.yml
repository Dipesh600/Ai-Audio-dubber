version: '3.8'

services:
  backend:
    build:
      context: ./orchestrator/backend
      dockerfile: Dockerfile
    container_name: audio-dubber-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - NODE_ENV=production
      - PROJECT_ROOT=/app
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN}
    volumes:
      # Persist DB and downloads across container restarts
      - db_data:/app/orchestrator/backend
      - output_data:/app/output
      - input_data:/app/input/audio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  db_data:
  output_data:
  input_data:
